# Keycloak IdP (standalone stack). Fronted by the shared proxy at
# https://keycloak.test:9443. Bring up with: ../up.sh  (or docker compose up -d)
name: keycloak

networks:
  default:
    name: os-sso-idp
    external: true

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HOSTNAME: https://keycloak.test:9443
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "0.0.0.0:8081:8080"   # http admin (host convenience / kcadm)
